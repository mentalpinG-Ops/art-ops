# ─────────────────────────────────────────────────────────────────────────────
# TESTS THAT UNLOCK ENFORCEMENT (§8 + governance rule 'enforcing needs a test')
# ─────────────────────────────────────────────────────────────────────────────
enforcement_gates:
  rule: >
    Governance rule (author decision 2026-07-18): enforcing encoding of an entry
    (block, discard, force-partition) presupposes a passed material test
    of the respective hypothesis, per operationalisation. Declarative use is
    free, but carries the evidence status in the output.
  decisive_tests:
    K2: "Two runs on the same artefact: simultaneous vs. sequenced. Does the simultaneous output carry both defining items? → refuted"
    K1: "Run after B, then A. Is A.requires still ascertainable on the artefact?"
    hardness: "Present the simultaneous output to a third party: are the defining items still nameable? no→hard, shortened→soft"
    interop_edge: "B with A output as the only input. Does B run without a resupply?"
    stage_ordering: "The same chain on three artefacts of different genre. Does the ordering hold?"
    cycle_O12_O24: "Attempt a linear sequence without stage decomposition of O12. If it succeeds, O12 was cut wrongly"
  # O19-author/O12-author (unmitigated) COMPLETED 2026-07-18/19 (see
  # authorship_exposition_screening.tested). Next cheap step per gnomic-result.md
  # Phase 4: the mitigated cells (B19g/B12g) — tests whether the authorship rule reaches the
  # runner. O7/O9 are the remaining untested 'high' cases.
  next_tests:
    - "O19-author-mitigated (B19g/B12g, gnomic)"
    - O7-author
    - O9-author
